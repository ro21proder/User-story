<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>User Story Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#1F3864;--navy-light:#2E4A7A;--paper:#f8f7f4;--border:rgba(31,56,100,0.15);
    --border-strong:rgba(31,56,100,0.3);--accent:#c8a96e;--accent-muted:rgba(200,169,110,0.15);
    --text:#1a1a2e;--muted:#6b6b7e;--success-bg:#e8f5ee;--success:#2d7a4f;
    --error-bg:#fdeaea;--error:#b53b3b;--fd:'Syne',sans-serif;--fm:'DM Mono',monospace;
  }
  body{background:var(--paper);font-family:var(--fd);color:var(--text);min-height:100vh}
  .shell{max-width:820px;margin:0 auto;padding:2rem 1.5rem 4rem}
  .header{display:flex;align-items:flex-end;gap:1rem;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
  .badge{background:var(--navy);color:#fff;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;border-radius:4px;font-family:var(--fm);margin-bottom:4px;display:inline-block}
  .title{font-size:22px;font-weight:700;color:var(--navy)}
  .sub{font-size:13px;color:var(--muted);font-family:var(--fm);margin-left:auto;white-space:nowrap}
  .lbl{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);font-family:var(--fm);margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .lbl::after{content:'';flex:1;height:.5px;background:var(--border)}
  .fg{margin-bottom:1.5rem}
  textarea{width:100%;background:#fff;border:.5px solid var(--border-strong);border-radius:8px;padding:12px 14px;font-size:14px;font-family:var(--fd);color:var(--text);outline:none;resize:vertical;min-height:160px;line-height:1.6;transition:border-color .15s}
  textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(31,56,100,.08)}
  .hint{font-size:12px;color:var(--muted);margin-top:5px;font-family:var(--fm)}
  .btn-gen{width:100%;background:var(--navy);color:#fff;border:none;border-radius:10px;padding:14px 24px;font-size:15px;font-weight:700;font-family:var(--fd);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:.5rem;transition:background .15s}
  .btn-gen:hover:not(:disabled){background:var(--navy-light)}
  .btn-gen:disabled{opacity:.5;cursor:not-allowed}
  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  .status{font-size:12px;font-family:var(--fm);padding:8px 12px;border-radius:8px;margin-top:.75rem;display:none;align-items:center;gap:8px}
  .status.error{display:flex;background:var(--error-bg);color:var(--error)}
  .status.ok{display:flex;background:var(--success-bg);color:var(--success)}
  .out{margin-top:2.5rem;display:none}
  .out.visible{display:block}
  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
  .btn-dl{display:flex;align-items:center;gap:6px;background:var(--accent-muted);border:.5px solid var(--accent);color:#7a5c1e;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500;font-family:var(--fd);cursor:pointer;transition:background .15s}
  .btn-dl:hover{background:rgba(200,169,110,.28)}
  .doc{background:#fff;border:.5px solid var(--border-strong);border-radius:12px;padding:2rem 2.25rem;line-height:1.75;font-size:14px;color:var(--text)}
  .doc h1{font-size:20px;font-weight:700;color:var(--text);margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:2px solid var(--navy)}
  .doc h2{font-size:15px;font-weight:700;color:var(--navy);margin-top:1.75rem;margin-bottom:.5rem;text-transform:uppercase;letter-spacing:.05em}
  .doc h3{font-size:14px;font-weight:700;color:var(--navy-light);margin-top:1.25rem;margin-bottom:.35rem}
  .doc ul{padding-left:1.25rem;margin-bottom:.5rem}
  .doc li{margin-bottom:4px}
  .doc p{margin-bottom:.5rem}
  .cursor{display:inline-block;width:2px;height:1em;background:var(--navy);margin-left:2px;vertical-align:text-bottom;animation:blink .9s step-end infinite}
  @keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div>
      <div><span class="badge">PM Toolkit</span></div>
      <div class="title" style="margin-top:6px">User Story Generator</div>
    </div>
    <div class="sub">powered by Gemini</div>
  </div>
  <div class="fg">
    <div class="lbl">Feature description</div>
    <textarea id="desc" placeholder="Describe the feature in your own words. Include who the user is, what they can do, how it is accessed, and any rules or edge cases.

Example: We are adding a saved prompts library to our chat app. Users can save any prompt they have sent by clicking a save icon. A popup lets them add a title, category, and edit the text. They can also create new categories inline..."></textarea>
    <p class="hint">Mode: Verbal / Chat Description — the more detail you give, the richer the output</p>
  </div>
  <button class="btn-gen" id="genBtn" onclick="generate()">
    <span id="btnTxt">Generate User Story</span>
  </button>
  <div class="status" id="status"></div>
  <div class="out" id="out">
    <div class="toolbar">
      <div class="lbl" style="flex:1;margin-bottom:0">Output</div>
      <button class="btn-dl" onclick="downloadDocx()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 10.5L4 6.5h3V2h2v4.5h3L8 10.5z" fill="currentColor"/><rect x="2" y="12" width="12" height="1.5" rx=".75" fill="currentColor"/></svg>
        Download .docx
      </button>
    </div>
    <div class="doc" id="doc"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.min.js"></script>
<script type="importmap">{"imports":{"@google/generative-ai":"https://esm.sh/@google/generative-ai@0.21.0"}}</script>
<script type="module">
import { GoogleGenerativeAI } from "@google/generative-ai";

const API_KEY = 'AIzaSyAn21wWnCNgCSH_iLdmaCzC2Weouzsh-9w';

const SYSTEM = `You are a senior Product Manager assistant. Generate well-structured product user stories.

Format using markdown strictly:
- # for the Feature Name (first line)
- ## for top-level sections: Objective, Overview, Functional Requirements, Edge Cases, Guardrails
- ### for each named section inside Functional Requirements
- - for all bullet points

Output structure:
# [Feature Name]

## Objective
[1-2 sentences]

## Overview
- [Key UX behaviour]
- [Key UX behaviour]
- [Key UX behaviour]

## Functional Requirements

### [Section Name]
- [Behaviour bullet]
- [Behaviour bullet]

Acceptance Criteria:
- [Testable outcome]
- [Testable outcome]

### [Another Section]
- [Behaviour bullet]

Acceptance Criteria:
- [Testable outcome]

## Edge Cases
- [Only include if relevant]

## Guardrails
- [Only include if relevant]

Rules:
- Objective and Overview appear ONCE at the top only — never repeated per section
- Acceptance Criteria: plain declarative bullets, NOT Given/When/Then
- Cover happy path, error states, fallbacks, empty states
- Use language: "The system must...", "Users can...", "The [component] displays..."
- No story points, no sprint estimates, no Out of Scope sections
- Respond ONLY with the user story. No preamble, no closing remarks.`;

let lastText = '';
let lastName = '';

function renderMd(t) {
  return t
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => '<ul>' + m + '</ul>')
    .replace(/\n{2,}/g, '\n')
    .replace(/^(?!<[hul])(.+)$/gm, m => m.trim() ? '<p>' + m + '</p>' : '');
}

function showStatus(msg, type) {
  const s = document.getElementById('status');
  s.className = 'status ' + type;
  s.textContent = msg;
}
function clearStatus() { document.getElementById('status').className = 'status'; }

async function generate() {
  const desc = document.getElementById('desc').value.trim();
  if (!desc) { showStatus('Please describe the feature first.', 'error'); return; }
  clearStatus();
  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div><span>Generating…</span>';
  const outEl = document.getElementById('out');
  const docEl = document.getElementById('doc');
  outEl.classList.add('visible');
  docEl.innerHTML = '<span class="cursor"></span>';
  let full = '';
  try {
    const ai = new GoogleGenerativeAI(API_KEY);
    const model = ai.getGenerativeModel({ model: 'gemini-2.0-flash', systemInstruction: SYSTEM });
    const result = await model.generateContentStream(desc);
    for await (const chunk of result.stream) {
      const txt = chunk.text();
      if (txt) { full += txt; docEl.innerHTML = renderMd(full) + '<span class="cursor"></span>'; }
    }
    docEl.innerHTML = renderMd(full);
    lastText = full;
    const m = full.match(/^#\s+(.+)$/m);
    lastName = m ? m[1].trim() : 'User Story';
    showStatus('User story generated successfully.', 'ok');
  } catch(e) {
    outEl.classList.remove('visible');
    showStatus(e.message || 'Something went wrong. Please try again.', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span id="btnTxt">Generate User Story</span>';
  }
}

async function downloadDocx() {
  if (!lastText) return;
  const { Document, Packer, Paragraph, TextRun } = docx;
  const N = '1F3864', NL = '2E4A7A';
  const kids = [];
  for (const line of lastText.split('\n')) {
    const t = line.trim();
    if (!t) { kids.push(new Paragraph({ text: '' })); continue; }
    if (t.startsWith('# '))
      kids.push(new Paragraph({ children: [new TextRun({ text: t.slice(2), bold: true, size: 40, font: 'Calibri', color: '000000' })], spacing: { after: 240 } }));
    else if (t.startsWith('## '))
      kids.push(new Paragraph({ children: [new TextRun({ text: t.slice(3), bold: true, size: 28, font: 'Calibri', color: N })], spacing: { before: 280, after: 160 } }));
    else if (t.startsWith('### '))
      kids.push(new Paragraph({ children: [new TextRun({ text: t.slice(4), bold: true, size: 24, font: 'Calibri', color: NL })], spacing: { before: 200, after: 120 } }));
    else if (t.startsWith('- '))
      kids.push(new Paragraph({ children: [new TextRun({ text: t.slice(2), font: 'Calibri', size: 22, color: '000000' })], bullet: { level: 0 }, spacing: { after: 60 } }));
    else
      kids.push(new Paragraph({ children: [new TextRun({ text: t, font: 'Calibri', size: 22, color: '000000' })], spacing: { after: 80 } }));
  }
  const d = new Document({ sections: [{ properties: { page: { margin: { top: 1440, bottom: 1440, left: 1440, right: 1440 } } }, children: kids }] });
  const blob = await Packer.toBlob(d);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (lastName.replace(/[^a-z0-9 ]/gi, '').replace(/\s+/g, '_') || 'user_story') + '.docx';
  a.click();
  URL.revokeObjectURL(url);
}

window.generate = generate;
window.downloadDocx = downloadDocx;
</script>
</body>
</html>
